<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyRunner - Gamer Games LLC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f2e;
            color: #c0c0c0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            color: #0066ff;
            text-shadow: 0 0 20px rgba(0, 102, 255, 0.5);
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #ff6600;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .description {
            max-width: 480px;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        a {
            color: #0066ff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #0066ff;
            border-radius: 4px;
            transition: background 0.2s;
        }
        a:hover {
            background: rgba(0, 102, 255, 0.15);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>SkyRunner</h1>
    <p class="subtitle">Vertical Climbing Runner</p>
    <p class="description">
        Climb an endless vertical shaft by tapping to jump between platforms.
        Stay alive as the world accelerates beneath you. How high can you go?
    </p>
    <div class="links">

    </div>
